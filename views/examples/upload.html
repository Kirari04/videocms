<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{.AppName}} || Upload Example</title>
        <script src="https://cdn.jsdelivr.net/npm/tus-js-client@4.3.1/dist/tus.min.js"></script>
    </head>
    <body>
        <img src="/logo.png" alt="Logo" width="100" />
        <h1>{{ .AppName }}</h1>
        <h2>Choose Video File</h2>
        <div>
            <progress id="progress" value="0" max="100"></progress>
        </div>
        <div>
            <input id="file" type="file" name="file" />
        </div>
        <br />
        <label>
            Parallel uploads
            <input id="parallelUploads" type="number" value="4" min="1" max="12" />
        </label>
        <div>
            <input id="origin" type="url" value="//localhost:3000" />
        </div>
        <br />
        <div>
            <button onclick="upload()">Upload</button>
        </div>
        <div>
            <pre class="log"></pre>
        </div>
        <script>
            const fileinput = document.getElementById("file");
            const progress = document.getElementById("progress");
            const logfield = document.querySelector(".log");
            const origininput = document.getElementById("origin");
            if (origininput.value === "") {
                origininput.value = window.location.origin;
            }

            const log = (msg) =>
                (logfield.innerHTML = `[${new Date().toLocaleString()}] ${msg}\n${logfield.innerHTML}`);

            let token = "";
            let timeout = new Date();
            let refreshing = false;

            setInterval(async () => {
                if (token !== "" && timeout.getTime() - 10_000 < new Date().getTime()) {
                    if (refreshing) return;
                    refreshing = true;
                    try {
                        const authHeaders = new Headers();
                        authHeaders.append("Authorization", `Bearer ${token}`);
                        const authRefresh = await fetch(origininput.value + "/api/auth/refresh", {
                            method: "get",
                            headers: authHeaders,
                            redirect: "follow",
                        }).then((response) => response.json());
                        token = authRefresh.token;
                        timeout = new Date(authRefresh.exp);
                        log("Auth token refreshed");
                    } catch (error) {
                        log(`Failed to refresh auth token: ${error}`);
                    } finally {
                        refreshing = false;
                    }
                }
            }, 1000);

            const login = async () => {
                const formdata = new FormData();
                formdata.append("username", "admin");
                formdata.append("password", "12345678");
                const result = await fetch(origininput.value + "/api/auth/login", {
                    method: "POST",
                    body: formdata,
                    redirect: "follow",
                }).then((response) => response.json());
                token = result.token;
                timeout = new Date(result.exp);
                log("Logged in using default admin credentials");
            };

            const finalizeUpload = async (uploadUrl) => {
                const uploadID = uploadUrl.split("/").filter(Boolean).pop();
                return await fetch(origininput.value + `/api/uploads/${encodeURIComponent(uploadID)}/finalize`, {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                    redirect: "follow",
                }).then((response) => response.json());
            };

            const upload = async () => {
                log("Script started");
                const file = fileinput.files[0];
                if (!file) {
                    log("No file selected");
                    return;
                }
                fileinput.style.opacity = ".4";
                fileinput.style.pointerEvents = "none";
                log(`File selected: ${file.name}`);

                try {
                    await login();
                } catch (error) {
                    log(`Failed to login: ${error}`);
                    return;
                }

                const clientUploadUUID = crypto.randomUUID();
                const parallelUploads = Number(document.getElementById("parallelUploads").value || 1);
                const metadata = {
                    filename: file.name,
                    client_upload_uuid: clientUploadUUID,
                };

                const tusUpload = new tus.Upload(file, {
                    endpoint: origininput.value + "/api/uploads",
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                    metadata,
                    metadataForPartialUploads: metadata,
                    parallelUploads,
                    chunkSize: 20 * 1024 * 1024,
                    retryDelays: [0, 1000, 3000, 5000, 10000],
                    storeFingerprintForResuming: true,
                    removeFingerprintOnSuccess: true,
                    onProgress(bytesUploaded, bytesTotal) {
                        progress.value = Math.floor((bytesUploaded / bytesTotal) * 100);
                    },
                    async onSuccess() {
                        log(`Tus upload complete: ${tusUpload.url}`);
                        const uploadedFile = await finalizeUpload(tusUpload.url);
                        progress.value = 100;
                        log(`Finalize response: ${JSON.stringify(uploadedFile).substring(0, 120)}`);
                        log(`${origininput.value}/v/${uploadedFile.UUID}`);
                    },
                    onError(error) {
                        log(`Upload failed: ${error}`);
                    },
                });

                const previousUploads = await tusUpload.findPreviousUploads();
                if (previousUploads.length > 0) {
                    tusUpload.resumeFromPreviousUpload(previousUploads[previousUploads.length - 1]);
                    log("Resuming previous tus upload");
                }
                tusUpload.start();
            };
        </script>
    </body>
</html>
